name: Deploy to Server

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Golang dependencies
        run: go mod tidy

      - name: Run tests using the Golang CLI
        run: go test ./...

      - name: Golang Build Step
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o mobo-${GITHUB_SHA} cmd/server/main.go
          chmod +x mobo-${GITHUB_SHA}

      - name: Build the React app
        working-directory: ./web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy binary using SCP
        env:
          USER: ubuntu
          HOST: mobo-ticketing.tech
          DIR: /home/ubuntu/releases
          SSH_KEY: ${{secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config

          # Create directory if it doesn't exist
          ssh -i ~/.ssh/id_rsa $USER@$HOST mkdir -p $DIR

          # Copy the binary to the releases
          scp -i ~/.ssh/id_rsa mobo-${GITHUB_SHA} $USER@$HOST:$DIR

          # Copy the frontend build
          ssh -i ~/.ssh/id_rsa $USER@$HOST "rm -rf /home/ubuntu/production/web && mkdir -p /home/ubuntu/production/web"
          scp -i ~/.ssh/id_rsa -r web/dist/* $USER@$HOST:/home/ubuntu/production/web/

          # Run the deploy.sh script on the server
          ssh -i ~/.ssh/id_rsa $USER@$HOST 'bash -s' < ./deploy/deploy.sh $GITHUB_SHA
